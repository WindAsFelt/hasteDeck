<ion-header [translucent]="true">
  <ion-toolbar mode="ios">
    <div class="top-btn-left" routerLink="/home">     
      <i class="fa-solid fa-arrow-left"></i>
    </div>
    
    <ion-title class="nombre">
      Crear tu perfil
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="contenido">
    <br>
      <div>
        <ion-input [(ngModel)]="getName" label="Nombre de usuario" label-placement="floating" fill="outline"></ion-input>
        <br>
        <ion-input [(ngModel)]="getCorr" label="Correo electrónico" label-placement="floating" fill="outline"></ion-input>
        <br>
        <ion-input [(ngModel)]="getPassword" label="Introduzca su contraseña" label-placement="floating" fill="outline"></ion-input>
        <br>
        <ion-checkbox [(ngModel)]="getFlag" labelPlacement="end">Soy dueño de un local.</ion-checkbox>
        <br>
        <br>
        <ion-button  id="open-toast" (click)="registrarUsuario()">Registrar cuenta</ion-button>
        
        <ion-toast trigger="open-toast" message="Usuario creado exitosamente" [duration]="5000"></ion-toast>
        <br>
      </div>
  </div>
  

</ion-content>
